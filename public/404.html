<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Andy Zhu</title>
    <script>
      // spa-github-pages: redirect unknown paths to index.html with the
      // original path encoded in the query string, so the SPA can restore it.
      // pathSegmentsToKeep = 0 because this is a user site served from root.
      (function (l) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
